<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Juego Pong clásico - Compatible con Android, Tablet y Desktop">
    <meta name="theme-color" content="#1e1e2e">
    <title>Pong Game - Android Compatible</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="scoreboard">
            <div class="score">
                <h2>🎮 Jugador</h2>
                <p id="playerScore">0</p>
            </div>
            <div class="title">
                <h1>PONG</h1>
            </div>
            <div class="score">
                <h2>🤖 Ordenador</h2>
                <p id="computerScore">0</p>
            </div>
        </div>
        
        <canvas id="pongCanvas" width="800" height="400" style="touch-action: none;"></canvas>
        
        <div class="controls">
            <p>🖱️ Mueve el ratón arriba/abajo • ⬆️⬇️ Usa las flechas • 📱 Toca en móvil</p>
            <button id="startBtn" class="btn">▶️ Start Game</button>
            <button id="resetBtn" class="btn">🔄 Reset Score</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
